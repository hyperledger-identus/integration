name: Run sdk-ts

on:
  workflow_call:
    inputs:
      env:
        type: string
    secrets:
      SLACK_WEBHOOK:
        required: true

permissions: {}

jobs:
  integration:
    name: "sdk-ts"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ENV: ${{ inputs.env }} # base64
      RUNNER: "sdk-ts"
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - run: corepack enable

      - name: Install rust
        run: |
          URL="https://raw.githubusercontent.com/rust-lang/rustup/refs/tags/1.28.2/rustup-init.sh"
          EXPECTED_HASH="17247e4bcacf6027ec2e11c79a72c494c9af69ac8d1abcc1b271fa4375a106c2"
          curl -sSfL "$URL" -o rustup-init.sh
          echo "$EXPECTED_HASH rustup-init.sh" | sha256sum -c -
          sh rustup-init.sh -y

      - name: Install wasm-pack
        env:
          VERSION: v0.13.1
        run: |
          URL="https://raw.githubusercontent.com/rustwasm/wasm-pack/refs/tags/v0.13.1/docs/_installer/init.sh"
          EXPECTED_HASH="3e91ccfb5ca63dfd6761a3b7acbf6aca04be365e900468888e6615e79528a7cc"
          curl -sSfL "$URL" -o wasm-pack-init.sh
          echo "$EXPECTED_HASH wasm-pack-init.sh" | sha256sum -c -
          sh wasm-pack-init.sh -y

      - name: Install dependencies
        run: npm ci

      - name: Map host.docker.internal to the runner host
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: Start Identus stack
        run: |
          ENV_JSON="$(echo "$ENV" | base64 --decode)"
          export CLOUD_AGENT_VERSION="$(echo "$ENV_JSON" | jq -r '.services.agent.version')"
          export MEDIATOR_VERSION="$(echo "$ENV_JSON" | jq -r '.services.mediator.version')"
          export NEOPRISM_VERSION="$(echo "$ENV_JSON" | jq -r '.services.node.version')"
          echo "cloud-agent=$CLOUD_AGENT_VERSION mediator=$MEDIATOR_VERSION neoprism=$NEOPRISM_VERSION"
          docker compose -f infra/docker-compose.ci.yml up -d --wait --wait-timeout 300

      - name: Execute sdk-ts
        run: npm run integration -- --runner sdk-ts

      - name: Dump stack logs
        # Always dump: the integration CLI swallows test failures (exits 0), so
        # `failure()` would skip this and we'd lose the agent-side context.
        if: always()
        run: |
          echo "::group::cloud-agent (full)"
          docker compose -f infra/docker-compose.ci.yml logs --no-color cloud-agent
          echo "::endgroup::"
          echo "::group::mediator / neoprism / dbs (tail)"
          docker compose -f infra/docker-compose.ci.yml logs --no-color --tail 300 mediator neoprism agent-db mongo
          echo "::endgroup::"

      - name: Tear down Identus stack
        if: always()
        run: docker compose -f infra/docker-compose.ci.yml down -v

      - name: Upload partial allure-results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sdk-ts
          path: './tmp/sdk-ts'
