name: Generate report

on:
  workflow_call:
    inputs:
      env:
        type: string
      run-id:
        type: string
      component:
        type: string
      sdk-ts:
        type: boolean
      sdk-kmp:
        type: boolean
      sdk-swift:
        type: boolean
    secrets:
      IDENTUS_CI:
        required: true
      SLACK_WEBHOOK:
        required: true
      HYP_BOT_GPG_PRIVATE:
        required: true
      HYP_BOT_GPG_PASSWORD:
        required: true

permissions: {}

jobs:
  report:
    name: "Generate report for ${{ inputs.component }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    env:
      COMPONENT: ${{ inputs.component }}
      ENV: ${{ inputs.env }} # Base64-encoded environment config
      GH_TOKEN: ${{ secrets.IDENTUS_CI }} # GitHub token for API access
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }} # Slack webhook for notifications

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.IDENTUS_CI }}
          fetch-depth: 0

      # Download Allure test results from SDK runner jobs
      # continue-on-error: true ensures workflow continues even if artifact download fails
      - name: Download sdk-ts report
        if: inputs.sdk-ts
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdk-ts
          path: tmp/sdk-ts
          run-id: ${{ inputs.run-id }}
          github-token: ${{ secrets.IDENTUS_CI }}

      - name: Download sdk-kmp report
        if: inputs.sdk-kmp
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdk-kmp
          path: tmp/sdk-kmp
          run-id: ${{ inputs.run-id }}
          github-token: ${{ secrets.IDENTUS_CI }}

      - name: Download sdk-swift
        if: inputs.sdk-swift
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sdk-swift
          path: tmp/sdk-swift
          run-id: ${{ inputs.run-id }}
          github-token: ${{ secrets.IDENTUS_CI }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Download github pages
        uses: ./.github/actions/get-pages
        with:
          github-token: ${{ secrets.IDENTUS_CI }}

      # Aggregate test results and generate Allure reports
      # This step processes Allure results, generates HTML reports, and updates manifests
      - name: Aggregate reports
        run: |
          npm ci
          npm run report

      - name: Update github pages
        uses: ./.github/actions/update-pages
        with:
          component: ${{ env.COMPONENT }}
          gpg-private-key: ${{ secrets.HYP_BOT_GPG_PRIVATE }}
          gpg-passphrase: ${{ secrets.HYP_BOT_GPG_PASSWORD }}

  # Deploy generated reports to GitHub Pages
  # Runs after report generation completes successfully
  deploy-pages:
    needs: report
    name: Update report website
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
